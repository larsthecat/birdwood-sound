<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BirdNet web inference test</title>
    <style>
      html, body {
          font-size: 15px;
          font-family: 'Courier New', Courier, monospace;
          background-color: #222;
          padding: 10px;
          margin: 0;
          color: bisque;
      }
      .error {
        color: rgb(224, 99, 99);
      }
  </style>
  </head>
  <body>
    <button onClick="run()">Test</button>
    <div id="log"></div>
    <script>
      window.wave = null
      window.BirdNetWorker = null
      window.birds = null
      async function runBirdNet() {
        const params = new URL(location).searchParams
        const backend = new URL(location.href).searchParams.get('backend')
        const useFastFFT = new URL(location.href).searchParams.get('fast_fft') === 'on'
        window.log.innerHTML = `tfjs backend: ${backend}, fast_fft=${useFastFFT ? 'on' : 'off'}<br/>`
        if (!window.wave || !window.BirdNetWorker || !window.birds) {
          window.log.innerHTML += `Loading birds list... `
          let start = performance.now()
          window.birds = (await fetch('models/birdnet/labels/en_us.txt').then(r => r.text())).split('\n')
          window.log.innerHTML += `${Math.round(performance.now() - start)}ms, ${birds.length} birds [OK]<br/>`

          window.log.innerHTML += `Loading test audio data... `
          start = performance.now()
          window.wave = await fetch('wave.json').then(r => r.json())
          window.log.innerHTML += `${Math.round(performance.now() - start)}ms [OK]<br/>`

          window.log.innerHTML += `Loading model... `
          start = performance.now()
          window.BirdNetWorker = new Worker(`birdnet.js${location.search}`)
          await new Promise(resolve => {
            function onMessage({ data }) {
              if (data.message === 'warmup') {
                window.log.innerHTML += `${Math.round(performance.now() - start)}ms [OK]<br/>`
                window.log.innerHTML += `Warm up... `
                start = performance.now()
              } else if (data.message === 'loaded') {
                BirdNetWorker.removeEventListener('message', onMessage)
                resolve()
              }
            }
            BirdNetWorker.addEventListener('message', onMessage)
          })
          window.log.innerHTML += `${Math.round(performance.now() - start)}ms [OK]<br/>`
        }
        window.log.innerHTML += `Inference... `
        start = performance.now()
        BirdNetWorker.postMessage({ message: 'predict', audioBuf: window.wave, batchSize: 1 })
        const prediction = await new Promise(resolve => {
            function onMessage({ data }) {
                if (data.message === 'predict') {
                    BirdNetWorker.removeEventListener('message', onMessage)
                    resolve(data.prediction)
                }
            }
            BirdNetWorker.addEventListener('message', onMessage)
        })
        window.log.innerHTML += `${Math.round(performance.now() - start)}ms [OK]<br/>`
        
        let guessList = []
        for (let i = 0; i < prediction.length; i++) {    
            const confidence = prediction[i]
            if (confidence > 0.1) {
                guessList.push({ bird: (birds[i] || '_').split('_')[1], confidence })
            }
        }
        guessList.sort((a, b) => a.confidence - b.confidence)
        window.log.innerHTML += '<br/>===== RESULT:<br/>'
        guessList.forEach(({ bird, confidence }) => {
            window.log.innerHTML += `${bird}, confidence: ${confidence.toFixed(2)}<br/>`
        })
      }
      function run() {
        runBirdNet().catch((e) => {
          window.log.innerHTML += `<p class="error">${e.stack}<p/>`
          throw e
        })
      }
    </script>
  </body>
</html>
